services:
  jenkins-al2023:
    build: .
    image: jenkins-al2023:latest
    container_name: jenkins-al2023
    tty: true
    stdin_open: true
    ports:
      - "8080:80"
    volumes:
      - ./nix:/workspace/setup-jenkins/nix
      - ./scripts:/workspace/setup-jenkins/scripts
    working_dir: /workspace/setup-jenkins
